name: iOS Check & Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ios-build:
    runs-on: macos-latest # GitHub дает доступ к Mac бесплатно для публичных репозиториев
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. Проверка: Запуск тестов на симуляторе iPhone
      - name: Run iOS Simulator Tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test

      # 2. Сборка приложения (без подписи, просто проверить билд)
      - name: Build iOS Framework
        run: ./gradlew :composeApp:assembleRelease

      # 3. Сохранение результата (артефакта)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: composeApp/build/bin/iosArm64/releaseFramework/