name: iOS_Build

on:
  push:
    branches: [ "main", "master", "mobile" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Cache Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x ./plotix_mobile/gradlew

      - name: Build Kotlin Framework
        working-directory: ./plotix_mobile
        run: ./gradlew :composeApp:assembleRelease

      - name: Build iOS Bundle (.app)
        working-directory: ./plotix_mobile/iosApp
        run: |
          xcodebuild -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build-data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        working-directory: ./plotix_mobile/iosApp
        run: |
          # Переходим в папку с билдом
          cd build-data/Build/Products/Release-iphoneos
          # Создаем структуру Payload для корректного IPA
          mkdir Payload
          cp -r iosApp.app Payload/
          # Архивируем
          zip -r Plotix_iOS.ipa Payload
          # Перемещаем в корень репозитория для удобства загрузки
          mv Plotix_iOS.ipa ../../../../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Plotix_iOS_Installation_File
          path: Plotix_iOS.ipa
          retention-days: 5