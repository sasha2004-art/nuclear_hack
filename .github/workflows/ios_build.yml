name: iOS_Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Cache Kotlin Native
        # Кэшируем компилятор Kotlin/Native и его части
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Grant execute permission for gradlew
        run: chmod +x ./plotix_mobile/gradlew

      - name: Build Kotlin Framework
        working-directory: ./plotix_mobile
        # Собираем общую логику и Compose под iOS
        run: ./gradlew :composeApp:assembleRelease

      - name: Build iOS Bundle (.app)
        working-directory: ./plotix_mobile/iosApp
        run: |
          # Собираем непосредственно само iOS приложение (оболочку)
          # Используем xcodebuild, отключая проверку подписей
          xcodebuild -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build-data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Zip iOS App
        # Sideloadly лучше всего кушает .zip файлы (которые он воспринимает как .ipa)
        # Упаковываем .app папку в архив
        working-directory: ./plotix_mobile/iosApp
        run: |
          cd build-data/Build/Products/Release-iphoneos
          zip -r ../../../../Plotix_iOS.zip *.app

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Plotix_iOS_Installation_File
          # Путь к нашему архиву
          path: plotix_mobile/iosApp/Plotix_iOS.ipa
          retention-days: 5