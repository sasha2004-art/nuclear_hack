name: iOS Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Go Mod Tidy
        working-directory: ./plotix_core
        run: go mod tidy

      - name: Build iOS
        # Указываем рабочую директорию, где лежит go.mod
        working-directory: ./plotix_core
        run: |
          # Создаем папку для результата на уровень выше (в корне репозитория)
          mkdir -p ../mobile_out
          # Запускаем сборку пакета ./mobile относительно текущей папки (plotix_core)
          gomobile bind -v -target=ios -o ../mobile_out/PlotixCore.xcframework ./mobile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlotixCore-iOS-Framework
          # Путь к файлу теперь в корне репозитория в папке mobile_out
          path: mobile_out/PlotixCore.xcframework