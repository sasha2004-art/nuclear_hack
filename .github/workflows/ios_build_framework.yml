name: iOS Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build iOS
        run: |
          mkdir -p mobile_out
          # Запуск сборки (путь должен соответствовать структуре)
          gomobile bind -v -target=ios -o mobile_out/PlotixCore.xcframework ./plotix_core/mobile

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: PlotixCore.xcframework
          path: mobile_out/PlotixCore.xcframework