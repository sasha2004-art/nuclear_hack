name: iOS Build framework Go
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Gomobile Tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Fetch Mobile Dependencies
        working-directory: ./plotix_core
        run: |
          # Принудительно скачиваем пакеты, которые требует gomobile для iOS
          go get golang.org/x/mobile/bind
          go get golang.org/x/mobile/bind/objc
          go mod tidy

      - name: Build iOS
        working-directory: ./plotix_core
        run: |
          mkdir -p ../mobile_out
          # Используем флаг -v для детального лога, если опять упадет
          gomobile bind -v -target=ios -o ../mobile_out/PlotixCore.xcframework ./mobile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlotixCore-iOS-Framework
          path: mobile_out/PlotixCore.xcframework